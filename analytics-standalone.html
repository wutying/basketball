<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>訓練數據分析｜獨立頁面</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --card: #fff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #dbe4f0;
      --ok: #16a34a;
      --warn: #f59e0b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      height: 64px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
    }
    h1 { margin: 0; font-size: 18px; }
    .btn {
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 10px;
      padding: 8px 10px;
      text-decoration: none;
      color: inherit;
      font-size: 13px;
    }

    .container { padding: 16px; display: grid; gap: 12px; }
    .toolbar, .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
    }
    .toolbar {
      padding: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .filter {
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 7px 10px;
      font-size: 13px;
      background: #fff;
    }

    .kpis {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .kpi {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
    }
    .kpi .label { color: var(--muted); font-size: 12px; }
    .kpi .value { font-size: 22px; font-weight: 700; margin-top: 4px; }

    .charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .chart {
      min-height: 220px;
      border: 1px dashed #bfd0ea;
      border-radius: 14px;
      background: #f8fbff;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #475569;
      font-size: 14px;
    }

    .table-wrap { padding: 12px; overflow: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border-bottom: 1px solid var(--border); padding: 10px; text-align: left; }
    th { color: var(--muted); font-weight: 600; }

    @media (max-width: 1000px) {
      .kpis { grid-template-columns: 1fr 1fr; }
      .charts { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>📊 訓練數據分析（獨立頁）</h1>
    <a class="btn" href="ui-mockup.html">回排程頁</a>
  </header>

  <main class="container">
    <section class="toolbar">
      <select class="filter"><option>本週</option><option selected>本月</option><option>本季</option></select>
      <select class="filter"><option selected>全隊</option><option>個人</option></select>
      <select class="filter"><option selected>全部分類</option><option>RFD</option><option>SSC</option><option>力量</option></select>
      <button class="btn">匯出 PDF</button>
      <button class="btn">匯出 Excel</button>
    </section>

    <section class="kpis">
      <div class="kpi"><div class="label">總訓練次數</div><div class="value">28</div></div>
      <div class="kpi"><div class="label">完成率</div><div class="value" style="color:var(--ok)">86%</div></div>
      <div class="kpi"><div class="label">平均 RPE</div><div class="value">7.2</div></div>
      <div class="kpi"><div class="label">高負荷日</div><div class="value" style="color:var(--warn)">6 天</div></div>
    </section>

    <section class="charts">
      <div class="chart">訓練量趨勢（折線圖）</div>
      <div class="chart">分類占比（圓餅圖）</div>
      <div class="chart">每週負荷熱力圖</div>
      <div class="chart">排程 vs 實作（柱狀圖）</div>
    </section>

    <section class="card table-wrap">
      <table>
        <thead>
          <tr><th>日期</th><th>動作</th><th>分類</th><th>組數</th><th>次數</th><th>重量(kg)</th><th>總重量(kg)</th><th>備註</th></tr>
        </thead>
        <tbody>
          <tr><td>2026-04-02</td><td>Box Jump</td><td>RFD</td><td>4</td><td>5</td><td>0</td><td>0</td><td>正常</td></tr>
          <tr><td>2026-04-03</td><td>Drop Jump</td><td>SSC</td><td>3</td><td>6</td><td>0</td><td>0</td><td>落地穩定</td></tr>
          <tr><td>2026-04-04</td><td>Back Squat</td><td>力量</td><td>5</td><td>5</td><td>100</td><td>2500</td><td>最後一組疲勞</td></tr>
        </tbody>
      </table>
    </section>
  </main>
</body>
</html>
